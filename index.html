<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Connections: Birthday Edition!</title>
  <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.6.0/dist/confetti.browser.min.js"></script>
  <style>
    :root {
      --bg-color: #ffffff;
      --text-color: #000000;
      --card-bg: #efeeed;
      --card-hover: #e2e1e0;
      --card-selected: #5a5958;
      --yellow-bg: #f9df6d;
      --green-bg: #a0c35a;
      --blue-bg: #b0c4de;
      --violet-bg: #ba81c5;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: 'Helvetica Neue', Arial, sans-serif;
      -webkit-tap-highlight-color: transparent;
    }

    body {
      background-color: var(--bg-color);
      color: var(--text-color);
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 10px;
      min-height: 100vh;
    }

    header {
      text-align: center;
      margin-bottom: 20px;
      width: 100%;
      max-width: 600px;
      border-bottom: 1px solid #d3d3d3;
      padding-bottom: 15px;
    }

    h1 {
      font-size: 28px;
      font-weight: 800;
      letter-spacing: -0.5px;
      margin-bottom: 5px;
    }

    h2 {
      font-size: 16px;
      font-weight: 400;
      color: #555;
    }

    #game-container {
      width: 100%;
      max-width: 600px;
      display: flex;
      flex-direction: column;
      gap: 15px;
    }

    #toast-container {
      height: 40px;
      display: flex;
      justify-content: center;
      align-items: center;
      pointer-events: none;
    }

    .toast {
      background-color: #000000;
      color: #ffffff;
      padding: 10px 20px;
      border-radius: 4px;
      font-size: 14px;
      font-weight: 600;
      opacity: 0;
      transition: opacity 0.3s ease;
      text-align: center;
    }

    .toast.show {
      opacity: 1;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 8px;
      width: 100%;
    }

    .card {
      background-color: var(--card-bg);
      border: none;
      border-radius: 6px;
      aspect-ratio: 1.5 / 1;
      display: flex;
      justify-content: center;
      align-items: center;
      text-align: center;
      font-size: clamp(11px, 2.8vw, 16px);
      font-weight: 700;
      text-transform: uppercase;
      cursor: pointer;
      padding: 5px;
      transition: background-color 0.15s, transform 0.1s;
      user-select: none;
    }

    .card:hover {
      background-color: var(--card-hover);
    }

    .card.selected {
      background-color: var(--card-selected);
      color: #ffffff;
    }

    .solved-banner {
      grid-column: span 4;
      border-radius: 6px;
      padding: 16px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .solved-banner h3 {
      font-size: 15px;
      font-weight: 800;
      text-transform: uppercase;
      margin-bottom: 4px;
      letter-spacing: 0.5px;
    }

    .solved-banner p {
      font-size: 14px;
      font-weight: 400;
      text-transform: uppercase;
    }

    .bg-yellow { background-color: var(--yellow-bg); }
    .bg-green { background-color: var(--green-bg); }
    .bg-blue { background-color: var(--blue-bg); }
    .bg-violet { background-color: var(--violet-bg); }

    #controls {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 15px;
      margin-top: 10px;
    }

    #mistakes-area {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 14px;
      font-weight: 600;
    }

    .dots-container {
      display: flex;
      gap: 6px;
    }

    .dot {
      width: 10px;
      height: 10px;
      background-color: #5a5958;
      border-radius: 50%;
      transition: transform 0.3s, background-color 0.3s;
    }

    .dot.lost {
      background-color: #d3d3d3;
      transform: scale(0.8);
    }

    #hint-area {
      display: none;
      background-color: #fff3cd;
      color: #856404;
      border: 1px solid #ffeeba;
      padding: 10px 16px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 700;
      text-align: center;
      width: 100%;
      animation: popIn 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
    }

    .buttons {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: center;
    }

    button {
      background-color: transparent;
      border: 1px solid #000000;
      border-radius: 20px;
      padding: 12px 20px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background-color 0.15s, color 0.15s;
    }

    button:hover {
      background-color: #000000;
      color: #ffffff;
    }

    button:disabled {
      border-color: #ccc;
      color: #ccc;
      cursor: not-allowed;
      background-color: transparent;
    }

    button.submit-btn {
      background-color: #000000;
      color: #ffffff;
    }

    button.submit-btn:hover {
      background-color: #333333;
    }

    button.submit-btn:disabled {
      background-color: #efeeed;
      border-color: #efeeed;
      color: #888;
    }

    @keyframes popIn {
      0% { transform: scale(0.8); opacity: 0; }
      100% { transform: scale(1); opacity: 1; }
    }
  </style>
</head>
<body>

  <header>
    <h1>CONNECTIONS</h1>
    <h2>Birthday Edition</h2>
  </header>

  <div id="game-container">
    <div id="toast-container">
      <div id="toast" class="toast"></div>
    </div>
    
    <div id="grid"></div>

    <div id="controls">
      <div id="mistakes-area">
        <span>Mistakes remaining:</span>
        <div class="dots-container" id="dots">
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
          <div class="dot"></div>
        </div>
      </div>

      <div id="hint-area">
        💡 Hint: Senua's Saga isn't what you think it is
      </div>

      <div class="buttons">
        <button id="shuffle-btn" onclick="shuffleWords()">Shuffle</button>
        <button id="deselect-btn" onclick="deselectAll()" disabled>Deselect All</button>
        <button id="submit-btn" class="submit-btn" onclick="submitSelection()" disabled>Submit</button>
      </div>
    </div>
  </div>

  <script>
    const categories = [
      {
        id: "yellow",
        title: "many names of the birthday boy",
        words: ["NERD", "BORILLA", "ROBOT", "MERMAN"],
        colorClass: "bg-yellow"
      },
      {
        id: "green",
        title: "your fav music genre - rock bands, but without colour in their names",
        words: ["SABBATH", "FLOYD", "DAY", "PLAIN T'S"],
        colorClass: "bg-green"
      },
      {
        id: "blue",
        title: "Video-game baddies",
        words: ["JADE", "ABBY", "LILITH", "LARA"],
        colorClass: "bg-blue"
      },
      {
        id: "violet",
        title: "Sabziyaan you hate, with their first letter changed",
        words: ["SENUA", "CHINDI", "LOBHI", "PADDU"],
        colorClass: "bg-violet"
      }
    ];

    let remainingWords = [];
    let selectedWords = [];
    let solvedCategories = [];
    let mistakes = 7;
    let gameOver = false;

    function initGame() {
      remainingWords = [];
      categories.forEach(cat => {
        cat.words.forEach(word => {
          remainingWords.push({ word: word, categoryId: cat.id });
        });
      });
      shuffleWords();
    }

    function shuffleWords() {
      for (let i = remainingWords.length - 1; i > 0; i--) {
        const j = Math.floor(Math.random() * (i + 1));
        [remainingWords[i], remainingWords[j]] = [remainingWords[j], remainingWords[i]];
      }
      render();
    }

    function selectWord(wordObj) {
      if (gameOver) return;

      const index = selectedWords.findIndex(w => w.word === wordObj.word);
      if (index > -1) {
        selectedWords.splice(index, 1);
      } else {
        if (selectedWords.length < 4) {
          selectedWords.push(wordObj);
        }
      }
      render();
    }

    function deselectAll() {
      selectedWords = [];
      render();
    }

    function showToast(message, duration = 2000) {
      const toast = document.getElementById("toast");
      toast.textContent = message;
      toast.classList.add("show");
      setTimeout(() => {
        toast.classList.remove("show");
      }, duration);
    }

    function submitSelection() {
      if (selectedWords.length !== 4 || gameOver) return;

      const selectedIds = selectedWords.map(w => w.categoryId);
      const firstId = selectedIds[0];
      const isCorrect = selectedIds.every(id => id === firstId);

      if (isCorrect) {
        const solvedCat = categories.find(c => c.id === firstId);
        solvedCategories.push(solvedCat);
        
        remainingWords = remainingWords.filter(w => w.categoryId !== firstId);
        selectedWords = [];
        
        if (solvedCategories.length === 4) {
          gameOver = true;
          showToast("HAPPY BIRTHDAY! YOU WON! 🎂", 5000);
          triggerConfetti();
        } else {
          showToast("Correct!", 1500);
        }
      } else {
        const counts = {};
        selectedIds.forEach(id => counts[id] = (counts[id] || 0) + 1);
        const maxMatch = Math.max(...Object.values(counts));

        mistakes--;
        updateMistakes();

        // Trigger Hint exact moment 3rd mistake is made (4 remaining)
        if (mistakes === 4) {
          document.getElementById("hint-area").style.display = "block";
          showToast("💡 Hint: Senua's Saga isn't what you think it is", 4500);
        } else if (maxMatch === 3) {
          showToast("One away...");
        } else {
          showToast("Not quite!");
        }

        if (mistakes === 0) {
          gameOver = true;
          showToast("Game Over! Revealing answers...", 3000);
          setTimeout(revealAll, 1500);
        }
      }
      render();
    }

    function revealAll() {
      const unsolved = categories.filter(c => !solvedCategories.includes(c));
      solvedCategories = solvedCategories.concat(unsolved);
      remainingWords = [];
      selectedWords = [];
      render();
    }

    function updateMistakes() {
      const dots = document.querySelectorAll(".dot");
      dots.forEach((dot, index) => {
        if (index >= mistakes) {
          dot.classList.add("lost");
        }
      });
    }

    function triggerConfetti() {
      if (typeof confetti === 'function') {
        var duration = 3 * 1000;
        var end = Date.now() + duration;
        (function frame() {
          confetti({
            particleCount: 5,
            angle: 60,
            spread: 55,
            origin: { x: 0 }
          });
          confetti({
            particleCount: 5,
            angle: 120,
            spread: 55,
            origin: { x: 1 }
          });
          if (Date.now() < end) {
            requestAnimationFrame(frame);
          }
        }());
      }
    }

    function render() {
      const grid = document.getElementById("grid");
      grid.innerHTML = "";

      solvedCategories.forEach(cat => {
        const banner = document.createElement("div");
        banner.className = `solved-banner ${cat.colorClass}`;
        banner.innerHTML = `
          <h3>${cat.title}</h3>
          <p>${cat.words.join(", ")}</p>
        `;
        grid.appendChild(banner);
      });

      remainingWords.forEach(wordObj => {
        const card = document.createElement("button");
        card.className = "card";
        card.textContent = wordObj.word;
        
        if (selectedWords.some(w => w.word === wordObj.word)) {
          card.classList.add("selected");
        }

        card.onclick = () => selectWord(wordObj);
        grid.appendChild(card);
      });

      document.getElementById("deselect-btn").disabled = selectedWords.length === 0 || gameOver;
      document.getElementById("submit-btn").disabled = selectedWords.length !== 4 || gameOver;
      document.getElementById("shuffle-btn").disabled = remainingWords.length === 0 || gameOver;
    }

    initGame();
  </script>
</body>
</html>
